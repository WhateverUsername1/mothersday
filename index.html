<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Día de las Madres!</title>
    <style>
        /* Estilos generales y fondo azul claro */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #0d47a1;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        /* Contenedor principal estilo tarjeta */
        .tarjeta {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(33, 150, 243, 0.15);
            padding: 40px 30px;
            max-width: 450px;
            text-align: center;
            margin: 20px;
            border-top: 6px solid #64b5f6;
        }

        /* Títulos */
        h1 {
            color: #1976d2;
            margin-top: 0;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        /* Textos */
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #546e7a;
            margin-bottom: 20px;
        }

        .corazon {
            color: #42a5f5;
            font-size: 2.5rem;
            display: block;
            margin: 15px 0;
            animation: latido 1.5s infinite;
        }

        /* Animación del corazón */
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .firma {
            font-style: italic;
            color: #1e88e5;
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        /* Contenedor y estilos de la imagen (ahora abajo) */
        .contenedor-imagen {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            border: 3px solid #e3f2fd;
            background-color: #f5f5f5;
            margin-top: 10px;
        }

        .contenedor-imagen img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Efecto al pasar el cursor sobre la foto */
        .contenedor-imagen img:hover {
            transform: scale(1.04);
        }

        footer {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #5c6bc0;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>¡Feliz Día de las Madres!</h1>
        
        <span class="corazon">💙</span>
        <p>My mother, gracias por todo. Sos increiblemente amada y apreciada. Te amo. Y espero que seas feliz el día de hoy y por el resto de los días.</p>
        <p class="firma">Con mucho amor.</p>

        <div class="contenedor-imagen">
            <img src="menu.jpg" alt="Foto con mamá o un detalle especial">
        </div>

    </div>

    <footer>
        Creado especialmente para ti
    </footer>

</body>
</html>
